name: Hourly Track Ingest

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure data directory
        run: mkdir -p data

      - name: Restore SQLite cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: data/music-scraper.sqlite
          key: music-scraper-db-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            music-scraper-db-${{ runner.os }}-${{ github.ref_name }}-

      - name: Run hourly ingest and maintenance
        run: |
          node src/cli.js ingest --config config.yaml --db data/music-scraper.sqlite
          node src/cli.js maintain-db --db data/music-scraper.sqlite

      - name: Evaluate yesterday (Berlin)
        run: |
          YESTERDAY_BERLIN=$(node --input-type=module -e "import { DateTime } from 'luxon'; console.log(DateTime.now().setZone('Europe/Berlin').minus({ days: 1 }).toISODate());")
          node src/cli.js evaluate-daily --config config.yaml --db data/music-scraper.sqlite --date "$YESTERDAY_BERLIN"

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/music-scraper.sqlite
          key: ${{ steps.restore-db.outputs.cache-primary-key }}
